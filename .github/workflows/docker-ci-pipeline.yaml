name: microservices CI/CD

on:
#   push:
#     branches:
#       - main
        
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
      # Set the working directory globally for all 'run' steps in this job
    
    strategy:
      matrix:
        service: [api-gateway, notification-service, order-service, product-service]
    defaults:
      run:
        working-directory: ./services/${{ matrix.service }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build --if-present
      
      - name: Upload artifacts #options to upload build/test artifacts for later jobs
        uses: actions/upload-artifact@v7
        with:
          name: node-app-artifacts
          path: .


  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v3
        with:
          context: ./services/${{ matrix.service }} # Specify the build context (e.g., the directory containing the Dockerfile)
          push: true
          platforms: linux/amd64,linux/arm64 # Build for multiple platforms
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}