apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway-deployment
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
        
# Watch the api-gateway-deployment.
# Keep at least 3 pods running.
# Allow up to 10 pods maximum.
# If average CPU usage reaches 70%, add more pods.
# If CPU usage drops, reduce pods.