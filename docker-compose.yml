services:

  product-service:
    build: ./services/product-service
    container_name: product-service
    ports:
      - "3001:3001"

  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    ports:
      - "3003:3003"

  order-service:
    build: ./services/order-service
    container_name: order-service
    ports:
      - "3002:3002"
    #Environment variable is needed by order service to call the notification service and product service to get the necessary information for processing orders and sending notifications.
    environment:
      - NOTIFICATION_SERVICE_URL=http://notification-service:3003
      - PRODUCT_SERVICE_URL=http://product-service:3001
    depends_on:
      - product-service
      - notification-service


  api-gateway:
    build: ./services/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    #Environment variable is needed by api service to talk to all the other services to route the requests to the appropriate service and get the necessary information for processing requests.
    environment:
      - ORDER_SERVICE_URL=http://order-service:3002
      - PRODUCT_SERVICE_URL=http://product-service:3001
      - NOTIFICATION_SERVICE_URL=http://notification-service:3003
    depends_on:
      - order-service
      - product-service
      - notification-service
